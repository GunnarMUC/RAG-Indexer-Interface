<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Pipeline - Ask Questions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 300;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .question-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .question-input:focus {
            border-color: #667eea;
        }

        .ask-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .ask-button:hover {
            transform: translateY(-2px);
        }

        .ask-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            color: #666;
            margin: 20px 0;
            display: none;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .response {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .question-display {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .answer-display {
            color: #555;
            line-height: 1.6;
        }

        .error {
            background: #fee;
            border-left-color: #e74c3c;
            color: #c0392b;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 RAG Pipeline</h1>
        <p class="subtitle">Ask questions about Goldlake View and get AI-powered answers</p>
        
        <div class="input-group">
            <input type="text" id="questionInput" class="question-input" 
                   placeholder="Ask a question about Goldlake View..." 
                   onkeypress="handleKeyPress(event)">
        </div>
        
        <button onclick="askQuestion()" id="askButton" class="ask-button">
            Ask Question
        </button>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Processing your question...</p>
        </div>
        
        <div id="response" class="response" style="display: none;">
            <div class="question-display" id="questionDisplay"></div>
            <div class="answer-display" id="answerDisplay"></div>
        </div>
        
        <div class="footer">
            Powered by Claude AI & Sentence Transformers
        </div>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                askQuestion();
            }
        }

        async function askQuestion() {
            const questionInput = document.getElementById('questionInput');
            const askButton = document.getElementById('askButton');
            const loading = document.getElementById('loading');
            const response = document.getElementById('response');
            const questionDisplay = document.getElementById('questionDisplay');
            const answerDisplay = document.getElementById('answerDisplay');

            const question = questionInput.value.trim();
            
            if (!question) {
                alert('Please enter a question');
                return;
            }

            // Show loading
            askButton.disabled = true;
            loading.style.display = 'block';
            response.style.display = 'none';

            try {
                const response_data = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response_data.json();

                if (data.status === 'success') {
                    questionDisplay.textContent = `Q: ${question}`;
                    answerDisplay.textContent = data.response;
                    response.className = 'response';
                } else {
                    questionDisplay.textContent = 'Error';
                    answerDisplay.textContent = data.error;
                    response.className = 'response error';
                }

                response.style.display = 'block';
                questionInput.value = '';

            } catch (error) {
                questionDisplay.textContent = 'Error';
                answerDisplay.textContent = 'Failed to connect to the server. Please try again.';
                response.className = 'response error';
                response.style.display = 'block';
            } finally {
                askButton.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
