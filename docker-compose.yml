version: '3.8'

services:
  rag-indexer:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CO_API_KEY=${CO_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - FLASK_DEBUG=False
      - HOST=0.0.0.0
      - PORT=8080
      - LOG_LEVEL=INFO
      - EMBEDDING_MODEL=all-mpnet-base-v2
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - TOP_K_RESULTS=5
      - SIMILARITY_THRESHOLD=0.7
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./sample_data:/app/sample_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a reverse proxy with nginx
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - rag-indexer
    restart: unless-stopped
    profiles:
      - production 